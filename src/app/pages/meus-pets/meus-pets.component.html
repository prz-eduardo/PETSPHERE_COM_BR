<app-navmenu *ngIf="!modal"></app-navmenu>

<div class="pets-page area-like-wrapper" [class.is-modal]="modal">
  <main class="container">
    <div class="top-actions" *ngIf="!modal">
      <button type="button" class="btn-back" (click)="voltar()">← Voltar</button>
    </div>
    <h1 class="page-title" *ngIf="!modal">Meus pets</h1>
    <p class="page-lead" *ngIf="!modal && !carregando && pets.length > 0">Toque no card para editar. Use o + para cadastrar outro pet.</p>

    <div class="page-tools" *ngIf="!carregando">
      <a class="btn-new-pet" href="/novo-pet" (click)="onNewPetClick($event)" aria-label="Cadastrar novo pet">
        <span class="btn-new-pet__plus" aria-hidden="true">+</span>
        <span>Cadastrar novo pet</span>
      </a>
    </div>

    <div *ngIf="carregando" class="state state--loading" aria-live="polite">Carregando seus pets…</div>

    <div *ngIf="!carregando && !pets.length" class="state state--empty">
      <p>Você ainda não cadastrou nenhum pet.</p>
      <a class="btn-cta" href="/novo-pet" (click)="onNewPetClick($event)">Cadastrar pet</a>
    </div>

    <ul *ngIf="!carregando && pets.length" class="pet-grid" role="list">
      <li *ngFor="let p of pets; let i = index" class="pet-grid__item" role="listitem">
        <div class="pet-card-outer">
        <button
          type="button"
          class="pet-card"
          (click)="onEditClick(p)"
          (keydown.enter)="onEditClick(p)"
        >
          <div class="pet-card__image-wrap">
            <img
              class="pet-card__image"
              [src]="getPetImageSrc(p)"
              (error)="onPetImgError($event)"
              (load)="onImgLoad(p, i)"
              [alt]="'Foto de ' + (p.nome || 'pet')"
              loading="lazy"
            />
            <div class="pet-card__veil pet-card__veil--top" aria-hidden="true"></div>
            <div class="pet-card__veil pet-card__veil--bottom" aria-hidden="true"></div>
            <div class="pet-card__header">
              <h2 class="pet-card__name" [class.pet-card__name--long]="(p.nome || '').length > 20">{{ p.nome || 'Sem nome' }}</h2>
              <p class="pet-card__species">
                <span class="pet-card__especie">{{ p.especie || '—' }}</span>
                <span *ngIf="p.raca" class="pet-card__sep">·</span>
                <span *ngIf="p.raca" class="pet-card__raca">{{ p.raca }}</span>
              </p>
            </div>
            <ul
              *ngIf="p.sexo || p.pesoKg != null || idadeAnosParaCard(p) != null || castradoBadge(p) || porteBadge(p)"
              class="pet-card__stat-bar"
              aria-label="Dados resumidos"
            >
              <li *ngIf="p.sexo" class="pet-stat">
                <span class="pet-stat__v">{{ p.sexo === 'F' || p.sexo === 'Fêmea' ? '♀' : (p.sexo === 'M' || p.sexo === 'Macho' ? '♂' : p.sexo) }}</span>
                <span class="pet-stat__k">sexo</span>
              </li>
              <li *ngIf="p.pesoKg != null" class="pet-stat">
                <span class="pet-stat__v">{{ p.pesoKg | number: '1.1-1' }} kg</span>
                <span class="pet-stat__k">peso</span>
              </li>
              <li *ngIf="idadeAnosParaCard(p) != null" class="pet-stat">
                <span class="pet-stat__v">{{ idadeAnosParaCard(p) }}</span>
                <span class="pet-stat__k">{{ p.data_nascimento || p.dataNascimento ? 'anos (aprox.)' : 'anos' }}</span>
              </li>
              <li *ngIf="porteBadge(p)" class="pet-stat">
                <span class="pet-stat__v pet-stat__v--narrow">{{ porteBadge(p) }}</span>
                <span class="pet-stat__k">porte</span>
              </li>
              <li *ngIf="castradoBadge(p)" class="pet-stat">
                <span class="pet-stat__v pet-stat__v--narrow">{{ castradoBadge(p) }}</span>
                <span class="pet-stat__k">repro.</span>
              </li>
            </ul>
          </div>

          <div class="pet-card__body">
            <p *ngIf="p.observacoes" class="pet-card__obs">
              <span class="pet-card__obs-label">Observações</span>
              <span class="pet-card__obs-txt">{{ p.observacoes }}</span>
            </p>
            <div *ngIf="p._alergiasNormalized?.length" class="pet-card__allergies">
              <span class="pet-card__obs-label">Alergias</span>
              <div class="pet-card__chips">
                <span class="pet-chip" *ngFor="let a of p._alergiasNormalized">{{ a }}</span>
              </div>
            </div>
            <div *ngIf="p.alergias_predefinidas?.length" class="pet-card__allergies">
              <span class="pet-card__obs-label">Alergias (lista)</span>
              <div class="pet-card__chips">
                <span class="pet-chip" *ngFor="let a of p.alergias_predefinidas">{{ a.nome }}</span>
              </div>
            </div>
            <div *ngIf="p._traitsNormalized?.length" class="pet-card__traits">
              <span class="pet-card__obs-label">Comportamentos e hábitos</span>
              <div class="pet-card__chips">
                <span class="pet-chip pet-chip--trait" *ngFor="let t of p._traitsNormalized">{{ t }}</span>
              </div>
            </div>
          </div>
        </button>
        <button
          type="button"
          class="pet-card__delete"
          (click)="onDeleteClick($event, p)"
          [disabled]="deletingPetId != null && deletingPetId === (idFor(p) || '')"
          [attr.aria-label]="'Excluir ' + (p.nome || 'pet')"
          title="Excluir"
        >
          <svg class="pet-card__delete-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M3 6h18M8 6V4h8v2M10 11v6M14 11v6M6 6l1 14h10l1-14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Excluir</span>
        </button>
        </div>
      </li>
    </ul>

    <a
      class="fab-pet"
      href="/novo-pet"
      (click)="onNewPetClick($event)"
      title="Novo pet"
      aria-label="Cadastrar novo pet"
    >＋</a>
  </main>

  <div
    *ngIf="pendingDeletePet"
    class="delete-modal__backdrop"
    role="presentation"
    (click)="cancelDelete()"
  >
    <div
      class="delete-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="delete-pet-title"
      aria-describedby="delete-pet-desc"
      (click)="$event.stopPropagation()"
    >
      <h2 id="delete-pet-title" class="delete-modal__title">Excluir pet?</h2>
      <p id="delete-pet-desc" class="delete-modal__text">
        Você está prestes a excluir <strong>{{ pendingDeleteName() }}</strong>. Esta ação não pode ser desfeita.
      </p>
      <div class="delete-modal__actions">
        <button type="button" class="delete-modal__btn delete-modal__btn--ghost" (click)="cancelDelete()" [disabled]="!!deletingPetId">
          Cancelar
        </button>
        <button type="button" class="delete-modal__btn delete-modal__btn--danger" (click)="confirmDelete()" [disabled]="!!deletingPetId">
          {{ deletingPetId ? 'Excluindo…' : 'Excluir' }}
        </button>
      </div>
    </div>
  </div>
</div>
