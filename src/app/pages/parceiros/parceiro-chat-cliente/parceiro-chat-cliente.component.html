<div class="wrap">
  <a routerLink="/parceiros/meus-clientes" class="back">← Meus clientes</a>
  <h1>Chat com o cliente</h1>
  <p class="muted" *ngIf="clienteLabel()">Conversa com <strong>{{ clienteLabel() }}</strong></p>

  <p class="err" *ngIf="loadErr()">{{ loadErr() }}</p>
  <p class="muted" *ngIf="loading()">Abrindo conversa…</p>

  <app-partner-chat-thread *ngIf="threadId()" [threadId]="threadId()!" mode="parceiro" />
</div>
