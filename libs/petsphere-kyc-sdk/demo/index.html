<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>alphavalid-sdk demo</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        background: #181818;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      #app {
        width: auto;
        max-width: 1000px;
        min-width: 320px;
        background: #222;
        border-radius: 18px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.25);
        overflow: visible;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 32px 0 0 0;
      }
      #camera-area {
        width: 360px;
        height: 640px;
        aspect-ratio: 9/16;
        background: #181818;
        border-radius: 32px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.18);
        overflow: hidden;
        position: relative;
        margin-bottom: 24px;
        display: flex;
        align-items: stretch;
        justify-content: stretch;
      }
      @media (max-width: 400px) {
        #camera-area {
          width: 100vw;
          height: auto;
          aspect-ratio: 9/16;
          border-radius: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="camera-area"></div>
    </div>
    <label style="display:block;margin:8px 0;">
      <input id="inShowDebugTable" type="checkbox">
      Mostrar tabela de debug
    </label>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
